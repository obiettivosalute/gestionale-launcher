<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Obiettivo Salute — Gestionale</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1B4965">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestionale OS">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1B4965 0%, #2D6A8F 50%, #5FA8D3 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-bottom: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status {
            font-size: 1rem;
            opacity: 0.9;
        }
        .btn-open {
            display: none;
            margin-top: 30px;
            padding: 14px 36px;
            background: #fff;
            color: #1B4965;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: transform 0.15s;
        }
        .btn-open:active { transform: scale(0.96); }
        .install-hint {
            display: none;
            margin-top: 24px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            max-width: 340px;
        }
    </style>
</head>
<body>
    <img src="icon-192.png" alt="Logo" class="logo">
    <h1>Obiettivo Salute</h1>
    <p class="subtitle">Gestionale Ortopedico</p>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Apertura gestionale...</p>
    <a class="btn-open" id="btnOpen" href="http://10.8.0.1:5000/" target="_blank" rel="noreferrer noopener">Apri Gestionale</a>
    <div class="install-hint" id="installHint">
        <strong>Installa come app:</strong><br>
        Android: menu ⋮ → "Installa app"<br>
        iOS: condividi ↑ → "Aggiungi a Home"
    </div>

    <script>
        const GESTIONALE_URL = 'http://10.8.0.1:5000/';

        // Register service worker for PWA installation
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }

        // Check if running as installed PWA (standalone mode)
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;

        if (isStandalone) {
            // PWA standalone: apri nel browser esterno per evitare blocco HTTPS→HTTP
            // Usa un link con target=_blank per uscire dal webview HTTPS della PWA
            setTimeout(() => {
                // Metodo 1: link invisibile con target=_blank
                const a = document.createElement('a');
                a.href = GESTIONALE_URL;
                a.target = '_blank';
                a.rel = 'noreferrer noopener';
                document.body.appendChild(a);
                a.click();

                // Metodo 2 fallback: window.open
                setTimeout(() => {
                    window.open(GESTIONALE_URL, '_blank', 'noreferrer');
                }, 500);

                // Aggiorna UI dopo il tentativo
                setTimeout(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status').textContent = 'Se non si è aperto, tocca il pulsante:';
                    document.getElementById('btnOpen').style.display = 'inline-block';
                    document.getElementById('btnOpen').target = '_blank';
                    document.getElementById('btnOpen').rel = 'noreferrer noopener';
                }, 1500);
            }, 600);
        } else {
            // Browser mode: show install instructions
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').textContent = 'Installa questa app per accedere al gestionale';
            document.getElementById('btnOpen').style.display = 'inline-block';
            document.getElementById('installHint').style.display = 'block';
        }

        // Handle beforeinstallprompt for Android
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.createElement('button');
            installBtn.className = 'btn-open';
            installBtn.style.display = 'inline-block';
            installBtn.style.background = '#62B6CB';
            installBtn.style.color = '#fff';
            installBtn.style.marginTop = '12px';
            installBtn.textContent = '📲 Installa App';
            installBtn.onclick = () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            };
            document.body.appendChild(installBtn);
        });
    </script>
</body>
</html>
